<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark brown background (rounded square) -->
  <rect width="32" height="32" rx="6" ry="6" fill="#2C1810"/>

  <!-- Gold 4-pointed sparkle star — matches the decorative stars in the logo -->
  <!-- Large star, center-left position -->
  <path d="M9,3.5 L10.6,7.4 L14.5,9 L10.6,10.6 L9,14.5 L7.4,10.6 L3.5,9 L7.4,7.4 Z"
        fill="#C9A748"/>

  <!-- Small star, top-right -->
  <path d="M24,2 L24.9,4.1 L27,5 L24.9,5.9 L24,8 L23.1,5.9 L21,5 L23.1,4.1 Z"
        fill="#C9A748"/>

  <!-- Tiny dot star, bottom-right -->
  <path d="M26,20 L26.6,21.4 L28,22 L26.6,22.6 L26,24 L25.4,22.6 L24,22 L25.4,21.4 Z"
        fill="#C9A748" opacity="0.8"/>

  <!-- "TCB" monogram, warm cream -->
  <text x="16.5" y="27"
        font-family="Georgia, serif"
        font-size="9"
        font-weight="700"
        fill="#F4ECD8"
        text-anchor="middle"
        letter-spacing="0.5">TCB</text>
</svg>
