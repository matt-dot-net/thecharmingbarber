server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text-based assets (images/fonts are already compressed)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;

    # Custom error pages
    error_page 404 /404.html;

    # Serve static files; fall back to 404.
    # HTML must always revalidate so deploys show up immediately.
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache" always;
    }

    # Cache images and fonts aggressively
    location /img/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # CSS/JS: cache long — the ?v= query string on these URLs handles cache-busting,
    # so bump the version in the HTML whenever css/js changes
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
